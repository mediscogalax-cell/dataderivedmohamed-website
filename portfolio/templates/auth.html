{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medsite Authentication</title>


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    radial-gradient(circle at top,#6abd05,#22193d,#111);

    font-family:Arial, Helvetica, sans-serif;

}




.auth-container{

    width:950px;

    max-width:95%;

    min-height:600px;

    display:flex;

    overflow:hidden;

    border-radius:30px;
    margin-top:100px;


    background:
    rgba(255,255,255,.15);


    backdrop-filter:blur(15px);


    box-shadow:

    0 25px 70px rgba(0,0,0,.5);

}




/* LEFT */


.left-box{


    flex:1;


    background:

    linear-gradient(
    135deg,
    #6abd05,
    #22193d
    );


    color:white;


    display:flex;


    flex-direction:column;


    justify-content:center;


    align-items:center;


    text-align:center;


    padding:40px;


}



.left-box h1{


    font-size:55px;

    margin-bottom:20px;


}



.left-box p{


    font-size:20px;

    line-height:1.7;


}





/* RIGHT */


.right-box{


    flex:1;


    background:white;


    padding:45px;


}




.right-box h2{


    text-align:center;


    color:#22193d;


    font-size:35px;


    margin-bottom:30px;


}





/* MESSAGES */


.message{


    background:#6abd05;


    color:white;


    padding:12px;


    text-align:center;


    border-radius:30px;


    margin-bottom:20px;


    animation:hide 5s forwards;


}



@keyframes hide{


0%{

opacity:1;

}


80%{

opacity:1;

}


100%{

opacity:0;

}


}





/* INPUTS */


.input-box{


    margin-bottom:20px;


}



.input-box input{


    width:100%;


    height:50px;


    border:none;


    outline:none;


    background:#eee;


    border-radius:30px;


    padding:0 20px;


    font-size:16px;


}





button{


    width:100%;


    height:50px;


    border:none;


    border-radius:30px;


    background:

    linear-gradient(
    45deg,
    #6abd05,
    #00a651
    );


    color:white;


    font-size:17px;


    font-weight:bold;


    cursor:pointer;


    transition:.4s;


}




button:hover{


    transform:translateY(-7px);


    box-shadow:

    0 15px 30px rgba(0,0,0,.3);


}





.divider{


    text-align:center;


    margin:35px 0;


    color:#777;


    font-weight:bold;


}
/* ================= PREMIUM FIXED NAVBAR ================= */


#container1{

    width:100%;

    min-height:75px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:10px 40px;
    margin-bottom:50px;


    background:

    rgba(17,17,17,0.65);


    backdrop-filter:blur(15px);

    -webkit-backdrop-filter:blur(15px);


    border-bottom:

    1px solid rgba(255,255,255,.2);


    position:fixed;

    top:0;

    left:0;


    z-index:9999;


}



/* MENU */

#menucon{

    display:flex;

    align-items:center;

    gap:35px;

}



#menucon a{

    color:white;

    text-decoration:none;

    font-size:18px;

    font-weight:bold;

    position:relative;

    transition:.4s;

}



#menucon a:hover{

    color:gold;

    transform:translateY(-4px);

}




/* UNDERLINE EFFECT */


#menucon a::after{

    content:"";

    position:absolute;

    left:0;

    bottom:-8px;

    width:0;

    height:3px;

    background:gold;

    transition:.4s;

}



#menucon a:hover::after{

    width:100%;

}





/* SEARCH BOX */


#s1{

    width:300px;

    height:42px;


    border-radius:30px;


    border:2px solid gold;


    background:transparent;


    color:white;


    outline:none;


    text-align:center;


    font-size:16px;


}



#s1::placeholder{

    color:white;

}




/* TIME AREA */


#tcon{

    display:flex;

    align-items:center;

}



#time{

    color:white;

    font-size:18px;

}





/* MOBILE RESPONSIVE */


@media(max-width:900px){


#container1{


    flex-direction:column;


    gap:15px;


    padding:20px;


}



#menucon{


    flex-wrap:wrap;

    justify-content:center;


}



#s1{


    width:90%;


}


}



/* SIGNUP FORM */


.signup-form input{


    width:100%;


    height:45px;


    border:none;


    outline:none;


    background:#eee;


    border-radius:30px;


    padding:0 20px;


    margin-bottom:15px;


}



.signup-form label{


    display:none;


}





@media(max-width:800px){


.auth-container{


    flex-direction:column;


}



.left-box h1{


    font-size:40px;


}


.right-box{


    padding:30px;


}



}



</style>


</head>



<body>

<header>

<div id="container1">


<div id="menucon">


<a href="{% url 'home' %}">
Home
</a>



<a href="{% url 'contact' %}">
Contact
</a>



<a href="{% url 'about' %}">
About
</a>



<a href="{% url 'auth_page' %}">
Login
</a>
<a href="{% url 'logout' %}">
    Logout
</a>


</div>



<input 
type="text"
id="s1"
placeholder="Search about Mr. Conteh">



<div id="tcon">

<p id="time"></p>

</div>



</div>

</header>


<div class="auth-container">



<div class="left-box">


<h1>

Medsite

</h1>


<p>

Create an account or login to access your dashboard.

</p>


</div>





<div class="right-box">



{% if messages %}

{% for message in messages %}

<div class="message">

{{message}}

</div>

{% endfor %}

{% endif %}






<!-- LOGIN -->


<h2>

Login

</h2>



<form method="POST" action="{% url 'login' %}">

{% csrf_token %}


<div class="input-box">

<input 

type="text"

name="username"

placeholder="Username"

required>

</div>



<div class="input-box">


<input 

type="password"

name="password"

placeholder="Password"

required>


</div>



<button type="submit">

LOGIN

</button>


</form>






<div class="divider">

OR CREATE ACCOUNT

</div>






<!-- SIGNUP -->

<!-- ================= PREMIUM SIGNUP ================= -->

<form method="POST" action="{% url 'signup' %}" class="signup-form">

{% csrf_token %}


<div class="input-box">

<input 
type="text"
name="username"
placeholder="Username"
required>

</div>



<div class="input-box">

<input 
type="email"
name="email"
placeholder="Email Address"
required>

</div>



<div class="input-box">

<input 
type="password"
name="password1"
placeholder="Password"
required>

</div>



<div class="input-box">

<input 
type="password"
name="password2"
placeholder="Confirm Password"
required>

</div>



<button type="submit">

CREATE ACCOUNT

</button>



</form>


</body>

</html>
